<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Demo | DIMECULTIVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }
        .glass-card { background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: #000000; border: 1px solid #333; color: white; transition: border-color 0.3s; }
        .input-field:focus { border-color: #ffffff; outline: none; }
    </style>
</head>
<body class="antialiased selection:bg-gray-700 selection:text-white">

    <nav class="w-full z-50 py-6 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-lg md:text-xl font-extrabold tracking-widest uppercase hover:text-gray-400 transition">DIMECULTIVA</a>
            <a href="index.html" class="text-xs md:text-sm font-semibold text-gray-400 hover:text-white transition">Cancel</a>
        </div>
    </nav>

    <section class="min-h-[80vh] flex items-center justify-center px-4 md:px-6 py-12">
        <div class="max-w-lg w-full glass-card p-6 md:p-10 rounded-sm">
            <div class="mb-8 text-center md:text-left">
                <h1 class="text-2xl md:text-3xl font-bold mb-2 tracking-tight">Schedule Discovery</h1>
                <p class="text-gray-400 text-sm font-light">Submit your details below. Our engineering team will review your infrastructure needs and coordinate a live demonstration.</p>
            </div>

            <form name="demo-booking" method="POST" action="/success.html" data-netlify="true" class="space-y-5">
                
                <input type="hidden" name="form-name" value="demo-booking" />

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">First Name</label>
                        <input type="text" name="first_name" required class="w-full input-field px-4 py-3 rounded-sm text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Last Name</label>
                        <input type="text" name="last_name" required class="w-full input-field px-4 py-3 rounded-sm text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Company Name</label>
                    <input type="text" name="company" required class="w-full input-field px-4 py-3 rounded-sm text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Work Email</label>
                    <input type="email" name="email" required class="w-full input-field px-4 py-3 rounded-sm text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Primary Operational Pain Point</label>
                    <textarea name="pain_point" rows="3" required class="w-full input-field px-4 py-3 rounded-sm text-sm resize-none" placeholder="E.g., We are managing multiple branches using disconnected Excel sheets..."></textarea>
                </div>

                <button type="submit" class="w-full bg-white text-black py-4 mt-4 rounded-sm font-bold hover:bg-gray-200 transition text-sm uppercase tracking-wide">
                    Book a Demo
                </button>
            </form>
        </div>
    </section>

</body>
</html>
